name: Keep-Alive Ping

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ping
        run: |
          git config user.name "Keep-Alive Bot"
          git config user.email "bot@ai-desk.tech"
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keepalive
          git add .github/keepalive
          git commit -m "chore: keep-alive ping [skip ci]"
          git push
