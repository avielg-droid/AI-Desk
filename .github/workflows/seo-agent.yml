name: SEO Agent — Daily Content Generation

on:
  schedule:
    # Every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run SEO agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/seo-agent.mjs

      - name: Commit and push new content
        run: |
          git config user.name "SEO Agent"
          git config user.email "seo-agent@ai-desk.tech"
          git add content/blog/ public/llms.txt
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "feat(blog): auto-generate SEO post [skip ci]"
            git push
          fi
